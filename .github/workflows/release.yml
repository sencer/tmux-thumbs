name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux:
    name: release Linux Musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Compile
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package and Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 'version =' Cargo.toml | cut -d '"' -f2)
          tag="v$version"
          
          # Package Linux Musl Tarball (tar.gz and tar.xz)
          mkdir -p target/x86_64-unknown-linux-musl/release/dist
          cp target/x86_64-unknown-linux-musl/release/thumbs target/x86_64-unknown-linux-musl/release/dist/
          cp target/x86_64-unknown-linux-musl/release/tmux-thumbs target/x86_64-unknown-linux-musl/release/dist/
          cp tmux-thumbs.sh tmux-thumbs.tmux tmux-thumbs-install.sh target/x86_64-unknown-linux-musl/release/dist/
          
          cd target/x86_64-unknown-linux-musl/release/dist
          
          # Create tar.gz
          tar -czf "../../../../tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.gz" *
          # Create tar.xz
          tar -cJf "../../../../tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.xz" *
          
          cd ../../../..
          
          # Calculate sha256sum
          sha256sum "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.gz" > "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.gz.sha256sum"
          sha256sum "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.xz" > "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.xz.sha256sum"
          
          # Upload to release
          gh release upload "$tag" \
            "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.gz" \
            "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.gz.sha256sum" \
            "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.xz" \
            "tmux-thumbs_${version}_x86_64-unknown-linux-musl.tar.xz.sha256sum" --clobber || true

  release-mac:
    name: release macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin
      - name: Compile x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Compile aarch64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package and Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 'version =' Cargo.toml | cut -d '"' -f2)
          tag="v$version"
          
          # Package Intel Zip
          mkdir -p target/x86_64-apple-darwin/release/dist
          cp target/x86_64-apple-darwin/release/thumbs target/x86_64-apple-darwin/release/dist/
          cp target/x86_64-apple-darwin/release/tmux-thumbs target/x86_64-apple-darwin/release/dist/
          cp tmux-thumbs.sh tmux-thumbs.tmux tmux-thumbs-install.sh target/x86_64-apple-darwin/release/dist/
          
          cd target/x86_64-apple-darwin/release/dist
          zip -r "../../../../tmux-thumbs_${version}_x86_64-apple-darwin.zip" *
          cd ../../../..
          
          # Package Apple Silicon Zip
          mkdir -p target/aarch64-apple-darwin/release/dist
          cp target/aarch64-apple-darwin/release/thumbs target/aarch64-apple-darwin/release/dist/
          cp target/aarch64-apple-darwin/release/tmux-thumbs target/aarch64-apple-darwin/release/dist/
          cp tmux-thumbs.sh tmux-thumbs.tmux tmux-thumbs-install.sh target/aarch64-apple-darwin/release/dist/
          
          cd target/aarch64-apple-darwin/release/dist
          zip -r "../../../../tmux-thumbs_${version}_aarch64-apple-darwin.zip" *
          cd ../../../..
          
          # Calculate sha256sum
          shasum -a 256 "tmux-thumbs_${version}_x86_64-apple-darwin.zip" > "tmux-thumbs_${version}_x86_64-apple-darwin.zip.sha256sum"
          shasum -a 256 "tmux-thumbs_${version}_aarch64-apple-darwin.zip" > "tmux-thumbs_${version}_aarch64-apple-darwin.zip.sha256sum"
          
          # Upload to release
          gh release upload "$tag" \
            "tmux-thumbs_${version}_x86_64-apple-darwin.zip" \
            "tmux-thumbs_${version}_x86_64-apple-darwin.zip.sha256sum" \
            "tmux-thumbs_${version}_aarch64-apple-darwin.zip" \
            "tmux-thumbs_${version}_aarch64-apple-darwin.zip.sha256sum" --clobber || true
